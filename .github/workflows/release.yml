name: Release

# Triggered when you push a tag like v0.1.0, v1.2.3, etc.
# Build artifacts get uploaded to the corresponding GitHub Release.
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write  # needed so softprops/action-gh-release can publish

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          # Workspace excludes the icon-gen tool; cache main workspace only.
          workspaces: ". -> target"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Enable MSI bundling
        shell: pwsh
        run: |
          $json = Get-Content crates/gui/tauri.conf.json -Raw | ConvertFrom-Json
          $json.bundle.active = $true
          $json.bundle.targets = @('msi', 'nsis')
          $json | ConvertTo-Json -Depth 20 | Set-Content crates/gui/tauri.conf.json -Encoding utf8

      - name: Build Tauri bundles (MSI + NSIS)
        run: cargo tauri build --config crates/gui/tauri.conf.json
        working-directory: ${{ github.workspace }}

      - name: Copy portable exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/GenCompare.exe dist/GenCompare-portable.exe

      - name: Collect installer artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Get-ChildItem -Path target/release/bundle/msi -Filter *.msi  | Copy-Item -Destination dist/
          Get-ChildItem -Path target/release/bundle/nsis -Filter *.exe | Copy-Item -Destination dist/
          Get-ChildItem dist/

      - name: Upload build artifacts (for workflow_dispatch runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: gen-compare-windows
          path: dist/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.msi
            dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
